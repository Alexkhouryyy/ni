<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex — Settings</title>
<style>
  :root { --bg:#070b14; --bg-2:#11161f; --border:#222a38; --text:#d7dde8; --mute:#8892a6; --accent:#6cf; }
  body { margin:0; padding:28px; font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); }
  .card { max-width:520px; margin:0 auto; background:var(--bg-2); border:1px solid var(--border); border-radius:14px; padding:24px; }
  h1 { font-size:18px; margin:0 0 4px; } .sub { color:var(--mute); font-size:13px; margin:0 0 20px; }
  label { display:block; font-size:12px; color:var(--mute); margin:14px 0 5px; }
  input { width:100%; box-sizing:border-box; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:9px; padding:10px 12px; font:inherit; }
  .row { display:flex; gap:10px; margin-top:20px; align-items:center; }
  button { background:var(--accent); color:#06121f; border:none; border-radius:9px; padding:10px 18px; font-weight:700; cursor:pointer; }
  .hint { color:var(--mute); font-size:12px; margin-top:6px; line-height:1.5; }
  .ok { color:#4ad07f; font-size:13px; }
  .divider { border:none; border-top:1px solid var(--border); margin:22px 0; }
</style>
</head>
<body>
  <div class="card">
    <h1>Connect to Apex</h1>
    <p class="sub">Point this extension at your Apex server.</p>

    <label>Pairing link (paste from the dashboard's “Pair a phone” QR)</label>
    <input id="pair" placeholder="https://your-apex/?source=pair#token=…">
    <div class="hint">Pasting a pairing link fills both fields below automatically.</div>

    <hr class="divider">

    <label>Apex server URL</label>
    <input id="baseUrl" placeholder="http://localhost:7860 or https://apex.example.com">
    <label>Dashboard token (leave blank if none)</label>
    <input id="token" type="password" placeholder="DASHBOARD_TOKEN">

    <div class="row">
      <button id="save">Save</button>
      <span id="saved" class="ok" hidden>Saved ✓</span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
