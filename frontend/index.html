<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050508" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JARVIS" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>JARVIS</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="orb-canvas"></canvas>

    <!-- Minimal controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-keyboard" title="Type instead">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-cost-dashboard">Cost Dashboard</button>
      <button id="btn-floating-orb">Floating Orb</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <!-- Text input bar — shown when keyboard mode active -->
    <div id="text-input-bar">
      <input id="text-input" type="text" placeholder="Ask JARVIS anything..." autocomplete="off" spellcheck="false" />
      <button id="text-send-btn" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <div id="status-text"></div>
    <div id="jarvis-label">JARVIS</div>
    <div id="study-mode-badge" style="display:none;position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#6366f1;color:#fff;font-size:0.7rem;font-family:'SF Pro Display',system-ui,sans-serif;letter-spacing:0.12em;padding:4px 14px;border-radius:20px;opacity:0.9;pointer-events:none;z-index:10">STUDY MODE</div>
    <div id="brutal-mode-badge" style="display:none;position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;font-size:0.7rem;font-family:'SF Pro Display',system-ui,sans-serif;letter-spacing:0.12em;padding:4px 14px;border-radius:20px;opacity:0.9;pointer-events:none;z-index:10">BRUTAL MODE</div>
    <div id="hyper-mode-badge" style="display:none;position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#fbbf24;color:#1f2937;font-size:0.7rem;font-family:'SF Pro Display',system-ui,sans-serif;letter-spacing:0.12em;padding:4px 14px;border-radius:20px;opacity:0.9;pointer-events:none;z-index:10">HYPER MODE</div>
    <div id="error-text"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
